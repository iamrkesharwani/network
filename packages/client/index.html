<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#18180F" />
    <meta
      name="description"
      content="A modern social media and video sharing platform."
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Network" />

      content="A modern social media and video sharing platform."
    />
    <meta property="og:image" content="/og-image.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Network" />

      name="twitter:description"
      content="A modern social media and video sharing platform."
    />

    <title>Network</title>

    <link rel="icon" type="image/svg+xml" href="./src/public/Favicon.svg" />

    <style>
      html,
      body {
        background-color: #0d0d0f;
      }
    </style>

    <script>
      (function () {
        try {
          const raw = localStorage.getItem('network:preferences:v1');
          const appearance = raw && JSON.parse(raw).appearance;
          if (appearance?.theme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          }
          document.documentElement.setAttribute(
            'data-sidebar-collapsed',
            appearance?.sidebarCollapsed === false ? 'false' : 'true'
          );
        } catch (error) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"><!--ssr-outlet--></div>
    <script type="module" src="/src/app/entry-client.tsx"></script>
  </body>
</html>
